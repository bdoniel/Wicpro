<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0a0a0f;--s:#111118;--c:#16161f;--b:#252535;--a:#6ee7b7;--a2:#818cf8;--r:#f87171;--g:#f59e0b;--t:#e2e8f0;--m:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--b) 1px,transparent 1px),linear-gradient(90deg,var(--b) 1px,transparent 1px);background-size:40px 40px;opacity:.2;pointer-events:none;z-index:0}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading.hide{display:none}
.spin{width:40px;height:40px;border:3px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:var(--m);font-size:13px;font-family:'DM Mono',monospace}

/* Scan page */
#scan-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px}
#scan-page.open{display:flex}
.s-icon{font-size:72px;margin-bottom:20px}
.s-title{font-size:28px;font-weight:800;margin-bottom:10px}
.s-sub{color:var(--m);font-size:14px;line-height:1.8;margin-bottom:16px;white-space:pre-line}
.s-cd{font-family:'DM Mono',monospace;font-size:15px;color:var(--a);font-weight:700}

/* Player page */
#player-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding:24px 20px}
#player-page.open{display:block}
.pw{max-width:500px;margin:0 auto;text-align:center;padding-bottom:40px}
.p-artist{font-size:12px;color:var(--g);font-family:'DM Mono',monospace;font-weight:600;margin-bottom:6px;letter-spacing:1px}
.p-title{font-size:22px;font-weight:800;margin-bottom:20px}
.p-cover{width:200px;height:200px;background:linear-gradient(135deg,var(--a2),var(--a));border-radius:14px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:72px;box-shadow:0 16px 48px rgba(129,140,248,.3)}
audio,video{width:100%;border-radius:10px;margin-bottom:16px}
.dl-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--a),#34d399);color:#0a0a0f;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:8px}
.dl-btn:hover{transform:translateY(-1px)}
.dl-btn:disabled{background:var(--b);color:var(--m);cursor:not-allowed;transform:none}
.dl-note{font-size:11px;color:var(--m);font-family:'DM Mono',monospace;margin-bottom:16px}
.p-code-box{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:14px;margin-top:16px}
.p-code-box p{font-size:11px;color:var(--m);font-family:'DM Mono',monospace;margin-bottom:5px}
.p-code-box span{font-size:22px;font-weight:800;color:var(--a);font-family:'DM Mono',monospace}

/* App */
#app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 20px;display:none}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--b);flex-wrap:wrap;gap:14px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--a),var(--a2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo h1 span{color:var(--a)}
.logo small{display:block;font-size:10px;color:var(--m);font-family:'DM Mono',monospace;letter-spacing:1px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--m);margin-right:5px;transition:background .3s;vertical-align:middle}
.dot.on{background:var(--a)}
.hright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tnav{display:flex;gap:3px;background:var(--s);padding:4px;border-radius:10px;border:1px solid var(--b)}
.tb{padding:7px 16px;border:none;background:transparent;color:var(--m);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tb.active{background:var(--c);color:var(--t)}
.tb:hover:not(.active){color:var(--t)}
.panel{display:none}.panel.active{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:28px;margin-bottom:24px}
.card h2{font-size:16px;font-weight:700;margin-bottom:20px}
.card h2 span{color:var(--a)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgp{display:flex;flex-direction:column;gap:7px}
.fgp.full{grid-column:1/-1}
label{font-size:11px;font-weight:700;color:var(--m);letter-spacing:.8px;text-transform:uppercase}
input,select{width:100%;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:11px 13px;color:var(--t);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--a2)}
select option{background:var(--s)}
.pw2{display:flex;gap:8px;align-items:center}
.cur{background:var(--b);color:var(--m);padding:11px 12px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap}
.pw2 input{flex:1}
.fa{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--a),#34d399);color:#0a0a0f}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(110,231,183,.2)}
.btn-g{background:linear-gradient(135deg,var(--g),#d97706);color:#0a0a0f}
.btn-g:hover{transform:translateY(-1px)}
.btn-gh{background:var(--s);color:var(--t);border:1px solid var(--b)}
.btn-gh:hover{border-color:var(--a2)}
.bsm{background:var(--s);color:var(--a2);border:1px solid var(--b);padding:5px 12px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;border-radius:7px;cursor:pointer;transition:all .2s}
.bsm:hover{border-color:var(--a2)}
.bdr{background:transparent;color:var(--r);border:1px solid var(--r);padding:5px 12px;font-size:11px;border-radius:7px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600}
.bdr:hover{background:rgba(248,113,113,.1)}

/* Result */
.res{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:28px;margin-bottom:24px;display:none;text-align:center}
.res.show{display:block;animation:fi .3s ease}
.qbox{display:inline-block;margin-bottom:20px;width:100%}
.qinfo{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:16px;text-align:left}
.qinfo p{font-family:'DM Mono',monospace;font-size:12px;color:var(--m);margin-bottom:5px}
.qinfo p:last-child{margin-bottom:0}
.qinfo span{color:var(--t);font-weight:600}
.qinfo .hl{color:var(--a)}
.dlbtn{width:100%;padding:12px;background:var(--s);color:var(--a2);border:1px solid var(--b);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:8px}
.dlbtn:hover{border-color:var(--a2)}
.nbtn{width:100%;padding:12px;background:transparent;color:var(--m);border:1px solid var(--b);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.nbtn:hover{color:var(--t);border-color:var(--m)}

/* QR list */
.qg{display:grid;gap:12px}
.qi{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
.qi.expired{opacity:.55;border-color:rgba(248,113,113,.4)}
.qth{width:56px;height:56px;background:white;border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.qth canvas,.qth img{width:52px!important;height:52px!important}
.qii h3{font-size:13px;font-weight:700;margin-bottom:2px}
.qat{font-size:11px;color:var(--g);font-family:'DM Mono',monospace;margin-bottom:5px;font-weight:600}
.qmt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.tg{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:10px;font-weight:600}
.tg-g{background:rgba(110,231,183,.12);color:var(--a);border:1px solid rgba(110,231,183,.2)}
.tg-r{background:rgba(248,113,113,.12);color:var(--r);border:1px solid rgba(248,113,113,.2)}
.tg-p{background:rgba(129,140,248,.12);color:var(--a2);border:1px solid rgba(129,140,248,.2)}
.tg-go{background:rgba(245,158,11,.12);color:var(--g);border:1px solid rgba(245,158,11,.2)}
.tg-code{background:rgba(110,231,183,.1);color:var(--a);border:1px solid rgba(110,231,183,.3)}
.br2{height:3px;background:var(--b);border-radius:2px;overflow:hidden;margin-top:6px}
.bf{height:100%;border-radius:2px;transition:width .3s}
.qac{display:flex;flex-direction:column;gap:5px}

/* Stats */
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:18px 22px}
.sl{font-size:10px;color:var(--m);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace}
.sv{font-size:28px;font-weight:800}
.sv.gn{color:var(--a)}.sv.pu{color:var(--a2)}.sv.rd{color:var(--r)}.sv.go{color:var(--g)}

/* Artist */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.ac{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:22px;position:relative;overflow:hidden}
.ac::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g),var(--a2))}
.ac-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ac-name{font-size:16px;font-weight:800}
.ac-rev{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;color:var(--g)}
.ac-sr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.ac-s{text-align:center}
.ac-sv{font-size:20px;font-weight:800}
.ac-sl{font-size:10px;color:var(--m);font-family:'DM Mono',monospace;margin-top:2px}
.ac-tr{border-top:1px solid var(--b);padding-top:12px}
.ac-ti{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(37,37,53,.5);font-size:12px}
.ac-ti:last-child{border-bottom:none}
.ac-tn{color:var(--t);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.ac-tin{font-family:'DM Mono',monospace;font-size:11px;color:var(--m)}
.ac-tp{font-family:'DM Mono',monospace;font-size:11px;color:var(--g);font-weight:600}

/* Log */
.lt{width:100%;border-collapse:collapse}
.lt th{text-align:left;font-size:10px;color:var(--m);letter-spacing:.8px;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid var(--b);font-family:'DM Mono',monospace}
.lt td{padding:10px 14px;font-family:'DM Mono',monospace;font-size:11px;border-bottom:1px solid rgba(37,37,53,.4)}
.lt tr:last-child td{border-bottom:none}
.lt tr:hover td{background:rgba(255,255,255,.015)}

/* PDF overlay */
.po{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;flex-direction:column}
.po.open{display:flex}
.po .spin{border-top-color:var(--g);margin-bottom:18px}
.po p{color:var(--t);font-size:14px;font-weight:600}

/* Search */
.sb{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sb input{flex:1;min-width:200px;padding:8px 12px;font-size:12px}
.sb select{width:auto;padding:8px 12px;font-size:12px}

.empty{text-align:center;padding:40px;color:var(--m);font-size:13px;font-family:'DM Mono',monospace}
.notif{position:fixed;bottom:20px;right:20px;background:var(--c);border:1px solid var(--a);border-radius:10px;padding:12px 18px;font-size:13px;z-index:9999;animation:ni .3s ease}
@keyframes ni{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:700px){.sr{grid-template-columns:repeat(2,1fr)}.fg{grid-template-columns:1fr}.qi{grid-template-columns:1fr}.ag{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p id="lmsg">Connexion...</p></div>

<div id="scan-page">
  <div class="s-icon" id="si"></div>
  <div class="s-title" id="st"></div>
  <div class="s-sub" id="ss"></div>
  <div class="s-cd" id="sc"></div>
</div>

<div id="player-page">
  <div class="pw">
    <div class="p-artist" id="pl-artist"></div>
    <div class="p-title" id="pl-title"></div>
    <div class="p-cover" id="pl-cover">🎵</div>
    <div id="pl-media"></div>
    <button class="dl-btn" id="dl-btn" onclick="doDownload()">&#8659; Telecharger (1 fois uniquement)</button>
    <div class="dl-note" id="dl-note">Ce bouton disparaitra apres telechargement</div>
    <div class="p-code-box">
      <p>TON CODE DE RENOUVELLEMENT</p>
      <span id="pl-code"></span>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⬛</div>
      <div>
        <h1>QR <span>Vault</span></h1>
        <small><span class="dot" id="dot"></span>LIVE</small>
      </div>
    </div>
    <div class="hright">
      <button class="btn btn-g" onclick="xPDF()">&#128424; PDF</button>
      <nav class="tnav">
        <button class="tb active" onclick="showTab('gen',event)">&#10022; Generateur</button>
        <button class="tb" onclick="showTab('dash',event)">&#9672; Dashboard</button>
      </nav>
    </div>
  </header>

  <div class="panel active" id="panel-gen">
    <div class="card">
      <h2>Nouveau QR Code <span>limite</span></h2>
      <div class="fg">
        <div class="fgp">
          <label>Artiste</label>
          <div style="display:flex;gap:8px">
            <select id="fa-sel" style="flex:1"><option value="">-- Existant --</option></select>
            <input type="text" id="fa-new" placeholder="Nouvel artiste..." style="flex:1" />
          </div>
        </div>
        <div class="fgp">
          <label>Titre</label>
          <input type="text" id="fn" placeholder="Ex : Album Vol.1" />

          <label>Lien du fichier (Cloudflare R2, Drive...)</label>

          <label>Scans max</label>

          <label>Prix (FCFA)</label>

        </div>

      </div>

        <button class="btn btn-p" onclick="creerQR()">&#11035; Generer QR</button>
        <button class="btn btn-gh" onclick="clearForm()">Effacer</button>

    </div>

    <div class="res" id="res">

    <div class="card">

  <div class="panel" id="panel-dash">

      <h2>Rapport par <span>Artiste</span></h2>
      <div class="ag" id="art-grid"></div>

    <div class="card">
      <h2>Journal des <span>Scans</span></h2>
      <div id="log-wrap"></div>
    </div>

</div>

<div class="po" id="po"><div class="spin"></div><p id="pmsg">PDF...</p></div>

<script>
const BASE = 'https://bdoniel.github.io/wicproci';
let items = [], logs = [], lastId = null, plItem = null, plQRId = null;

// ── Init ───────────────────────────────────────────────────────────────────────
window.onload = function() {
  DB.ref('qrcodes').once('value')
    .then(() => {
      document.getElementById('dot').classList.add('on');
      const sid = new URLSearchParams(location.search).get('scan');
      if (sid) { handleScan(sid); return; }
      document.getElementById('loading').classList.add('hide');
      document.getElementById('app').style.display = 'block';
      DB.ref('qrcodes').on('value', snap => {
        items = Object.values(snap.val()||{}).sort((a,b)=>(b.created||0)-(a.created||0));
        refreshSelects(); renderList();
      });
      DB.ref('scanlogs').on('value', snap => {
        logs = Object.values(snap.val()||{}).sort((a,b)=>(b.time||0)-(a.time||0));
      });
    })
    .catch(err => {
      document.getElementById('lmsg').textContent = 'Erreur: ' + err.message;
    });
};

// ── Scan ───────────────────────────────────────────────────────────────────────
async function handleScan(id) {
  document.getElementById('lmsg').textContent = 'Verification...';
  try {
    const snap = await DB.ref('qrcodes/'+id).once('value');
    const item = snap.val();
    document.getElementById('loading').classList.add('hide');

    if (!item) {
      document.getElementById('scan-page').classList.add('open');
      document.getElementById('si').textContent = '?';
      document.getElementById('st').textContent = 'QR introuvable';
      document.getElementById('ss').textContent = 'Ce QR code nexiste pas.';
      return;
    }

    if (item.scans >= item.limit) {
      document.getElementById('scan-page').classList.add('open');
      document.getElementById('si').textContent = '🚫';
      document.getElementById('st').textContent = 'Acces expire';
      document.getElementById('ss').innerHTML =
        (item.expiredMsg || 'Ce QR a atteint sa limite.') +
        '<br><br><div style="background:#16161f;border:2px solid #6ee7b7;border-radius:12px;padding:16px 24px;display:inline-block;margin-top:8px">' +
        '<div style="font-size:11px;color:#64748b;font-family:DM Mono,monospace;margin-bottom:6px">TON CODE DE RENOUVELLEMENT</div>' +
        '<div style="font-size:28px;font-weight:800;color:#6ee7b7;font-family:DM Mono,monospace">#' + (item.code||'----') + '</div>' +
        '<div style="font-size:11px;color:#64748b;margin-top:6px;font-family:DM Mono,monospace">Communique ce code pour renouveler</div></div>';
    } else {
      const ns = item.scans + 1;
      await DB.ref('qrcodes/'+id).update({scans: ns});
      await DB.ref('scanlogs/log_'+Date.now()).set({
        qrId:id, artist:item.artist, name:item.name, time:Date.now(), remaining:item.limit-ns, price:item.price||0
      });
      showPlayer(item, id);
    }
  } catch(e) {
    document.getElementById('loading').classList.add('hide');
    document.getElementById('scan-page').classList.add('open');
    document.getElementById('si').textContent = '!';
    document.getElementById('st').textContent = 'Erreur';
    document.getElementById('ss').textContent = e.message;
  }
}

// ── Player ─────────────────────────────────────────────────────────────────────
async function showPlayer(item, qrId) {
  plItem = item; plQRId = qrId;
  document.getElementById('player-page').classList.add('open');
  document.getElementById('pl-artist').textContent = item.artist.toUpperCase();
  document.getElementById('pl-title').textContent = item.name;
  document.getElementById('pl-code').textContent = '#' + (item.code||'----');

  const url = item.url;
  const isVideo = /\.(mp4|webm|mov)/i.test(url);
  const media = document.getElementById('pl-media');

  if (isVideo) {
    document.getElementById('pl-cover').style.display = 'none';
    media.innerHTML = '<video controls controlsList="nodownload" oncontextmenu="return false"><source src="'+url+'"></video>';
  } else {
    media.innerHTML = '<audio controls controlsList="nodownload" oncontextmenu="return false"><source src="'+url+'"></audio>';
  }

  // Check download status
  const dlSnap = await DB.ref('downloads/'+qrId).once('value');
  const dlData = dlSnap.val();
  if (dlData && dlData.used) {
    document.getElementById('dl-btn').disabled = true;
    document.getElementById('dl-btn').textContent = 'Telechargement deja utilise';
    document.getElementById('dl-note').textContent = 'Utilise le ' + new Date(dlData.time).toLocaleDateString('fr-FR');
  }
}

async function doDownload() {
  if (!plItem) return;
  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.textContent = 'Telechargement...';
  await DB.ref('downloads/'+plQRId).set({used:true, time:Date.now(), artist:plItem.artist, name:plItem.name});
  const a = document.createElement('a');
  a.href = plItem.url;
  a.download = (plItem.artist+'-'+plItem.name).replace(/[^a-zA-Z0-9]/g,'_');
  a.target = '_blank';
  a.click();
  btn.textContent = 'Telechargement effectue';
  document.getElementById('dl-note').textContent = 'Merci !';
}

// ── Tabs ───────────────────────────────────────────────────────────────────────
function showTab(tab, e) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(e&&e.target)e.target.classList.add('active');
  if(tab==='dash'){renderStats();renderArtists();renderLog();}
}

// ── Selects ────────────────────────────────────────────────────────────────────
function getArtists(){return[...new Set(items.map(q=>q.artist).filter(Boolean))].sort();}
function refreshSelects(){
  ['fa-sel','f-artist'].forEach(id=>{
    const sel=document.getElementById(id),val=sel.value;
    while(sel.options.length>1)sel.remove(1);
    getArtists().forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sel.appendChild(o);});
    if(val)sel.value=val;
  });
}

// ── Create QR ──────────────────────────────────────────────────────────────────
function genCode(artist){
  const ini=artist.replace(/[^a-zA-Z]/g,'').slice(0,2).toUpperCase()||'QR';
  return ini+'-'+Math.floor(1000+Math.random()*9000);
}

async function creerQR(){
  const artist=document.getElementById('fa-new').value.trim()||document.getElementById('fa-sel').value.trim();
  const name=document.getElementById('fn').value.trim();
  const url=document.getElementById('fu').value.trim();
  const limit=parseInt(document.getElementById('fl').value)||1;
  const price=parseFloat(document.getElementById('fp').value)||0;
  const expMsg=document.getElementById('fm').value.trim()||'Acces expire. Contactez BDoniel.';
  if(!artist){notif('Indique le nom de l artiste !');return;}
  if(!name){notif('Indique le titre !');return;}
  if(!url||!url.startsWith('http')){notif('Lien invalide !');return;}
  const id='qr_'+Date.now();
  const link=BASE+'/?scan='+id;
  const code=genCode(artist);
  try{
    await DB.ref('qrcodes/'+id).set({id,artist,name,url,limit,price,scans:0,expiredMsg:expMsg,created:Date.now(),accessLink:link,code});
    lastId=id;
    showResult({id,artist,name,url,limit,price,scans:0,accessLink:link,code});
    notif('QR cree ! Code : #'+code);
  }catch(e){notif('Erreur : '+e.message);}
}

function clearForm(){
  ['fn','fu','fm','fp','fa-new'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fa-sel').value='';
  document.getElementById('fl').value='1';
}

// ── Show QR card ───────────────────────────────────────────────────────────────
function showResult(item){
  const box=document.getElementById('qbox');
  box.innerHTML='';
  const tmp=document.createElement('div');
  tmp.style.cssText='position:absolute;left:-9999px;top:-9999px;background:white;';
  document.body.appendChild(tmp);
  new QRCode(tmp,{text:item.accessLink,width:300,height:300,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const qrc=tmp.querySelector('canvas');
    if(!qrc){document.body.removeChild(tmp);return;}
    const canvas=document.createElement('canvas');
    canvas.width=600;canvas.height=760;
    const ctx=canvas.getContext('2d');
    // Fond blanc
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,600,760);
    // Barre haut
    const g=ctx.createLinearGradient(0,0,600,0);g.addColorStop(0,'#6ee7b7');g.addColorStop(1,'#818cf8');
    ctx.fillStyle=g;ctx.fillRect(0,0,600,8);
    // Artiste
    ctx.fillStyle='#d97706';ctx.font='bold 28px Arial';ctx.textAlign='center';
    ctx.fillText(item.artist.toUpperCase(),300,52);
    // Titre
    ctx.fillStyle='#111827';ctx.font='bold 20px Arial';
    ctx.fillText(item.name,300,84);
    // Separator
    ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,100);ctx.lineTo(560,100);ctx.stroke();
    // QR bg
    ctx.fillStyle='#f3f4f6';
    if(ctx.roundRect)ctx.roundRect(115,112,370,370,16);else ctx.rect(115,112,370,370);
    ctx.fill();
    // QR
    ctx.drawImage(qrc,145,142,310,310);
    // Instruction
    ctx.fillStyle='#059669';ctx.font='bold 18px Arial';
    ctx.fillText('SCANNEZ POUR ACCEDER AU CONTENU',300,516);
    // Separator
    ctx.strokeStyle='#e5e7eb';ctx.beginPath();ctx.moveTo(40,532);ctx.lineTo(560,532);ctx.stroke();
    // Code box
    ctx.fillStyle='#f0fdf4';
    if(ctx.roundRect)ctx.roundRect(150,544,300,52,8);else ctx.rect(150,544,300,52);
    ctx.fill();
    ctx.strokeStyle='#6ee7b7';ctx.lineWidth=1.5;ctx.strokeRect(150,544,300,52);
    ctx.fillStyle='#374151';ctx.font='bold 12px Arial';ctx.fillText('CODE DE RENOUVELLEMENT',300,562);
    ctx.fillStyle='#059669';ctx.font='bold 24px Arial';
    ctx.fillText('#'+(item.code||'----'),300,590);
    // Barre bas
    ctx.fillStyle=g;ctx.fillRect(0,752,600,8);
    document.body.removeChild(tmp);
    canvas.style.cssText='width:100%;max-width:380px;border-radius:12px;display:block;margin:0 auto;box-shadow:0 8px 32px rgba(0,0,0,.15);';
    box.appendChild(canvas);
    box._canvas=canvas;box._item=item;
    document.getElementById('qinfo').innerHTML=
      '<p>Code : <span class="hl">#'+(item.code||'----')+'</span></p>'+
      '<p>Artiste : <span>'+item.artist+'</span></p>'+
      '<p>Titre : <span>'+item.name+'</span></p>'+
      '<p>Scans max : <span class="hl">'+item.limit+'</span></p>'+
      '<p>Prix : <span>'+(item.price>0?item.price.toLocaleString('fr-FR')+' FCFA':'Gratuit')+'</span></p>';
    const res=document.getElementById('res');res.classList.add('show');res.scrollIntoView({behavior:'smooth'});
  },400);
}

function dlPNG(){
  const box=document.getElementById('qbox'),canvas=box._canvas,item=box._item;
  if(!canvas){notif('Patiente 1s...');return;}
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='QR-'+(item.artist+'-'+item.name).replace(/[^a-zA-Z0-9]/g,'_')+'.png';
  a.click();notif('PNG telecharge !');
}

function nouveau(){
  document.getElementById('res').classList.remove('show');
  document.getElementById('qbox').innerHTML='';
  clearForm();lastId=null;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── List ───────────────────────────────────────────────────────────────────────
function renderList(){
  const c=document.getElementById('lst');
  const fa=document.getElementById('f-artist').value;
  const fs=document.getElementById('f-status').value;
  const sr=(document.getElementById('search').value||'').toLowerCase();
  let f=[...items];
  if(fa)f=f.filter(q=>q.artist===fa);
  if(fs==='active')f=f.filter(q=>q.scans<q.limit);
  if(fs==='expired')f=f.filter(q=>q.scans>=q.limit);
  if(sr)f=f.filter(q=>(q.code||'').toLowerCase().includes(sr)||(q.artist||'').toLowerCase().includes(sr)||(q.name||'').toLowerCase().includes(sr));
  document.getElementById('lc').textContent='('+f.length+')';
  c.innerHTML='';
  if(!f.length){c.innerHTML='<div class="empty">Aucun QR code.</div>';return;}
  f.forEach(item=>{
    const ex=item.scans>=item.limit,pct=Math.min((item.scans/item.limit)*100,100);
    const bc=pct<50?'#6ee7b7':pct<80?'#fbbf24':'#f87171';
    const pr=item.price>0?item.price.toLocaleString('fr-FR')+' FCFA':'Gratuit';
    const d=document.createElement('div');
    d.className='qi'+(ex?' expired':'');
    d.innerHTML='<div class="qth" id="it-'+item.id+'"></div>'+
      '<div class="qii">'+
        '<div class="qat">'+item.artist+'</div>'+
        '<h3>'+item.name+'</h3>'+
        '<div class="qmt">'+
          (ex?'<span class="tg tg-r">Expire</span>':'<span class="tg tg-g">Actif</span>')+
          '<span class="tg tg-p">'+item.scans+'/'+item.limit+' scans</span>'+
          '<span class="tg tg-go">'+pr+'</span>'+
          '<span class="tg tg-code">#'+(item.code||'----')+'</span>'+
        '</div>'+
        '<div class="br2"><div class="bf" style="width:'+pct+'%;background:'+bc+'"></div></div>'+
      '</div>'+
      '<div class="qac">'+
        '<button class="bsm" onclick="voirQR(\''+item.id+'\')">Voir QR</button>'+
        '<button class="bsm" onclick="genDepuis(\''+item.id+'\')" >+ Nouveau</button>'+
        (ex?'<button class="bsm" style="color:var(--a);border-color:var(--a)" onclick="reactiver(\''+item.id+'\')">Reactiver</button>':
            '<button class="bsm" onclick="resetScans(\''+item.id+'\')">Reset</button>')+
        '<button class="bdr" onclick="delQR(\''+item.id+'\')">Suppr.</button>'+
      '</div>';
    c.appendChild(d);
    new QRCode(document.getElementById('it-'+item.id),{text:item.accessLink,width:52,height:52,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
  });
}

function voirQR(id){const item=items.find(q=>q.id===id);if(!item)return;lastId=id;showResult(item);document.getElementById('res').scrollIntoView({behavior:'smooth'});}
async function resetScans(id){await DB.ref('qrcodes/'+id).update({scans:0});notif('Reset !');}
async function reactiver(id){
  const item=items.find(q=>q.id===id);if(!item)return;
  if(!confirm('Reactiver #'+(item.code||id)+' pour '+item.artist+' ?'))return;
  await DB.ref('qrcodes/'+id).update({scans:0});
  notif('QR reactrive ! '+item.artist+' peut scanner a nouveau.');
}
async function delQR(id){if(!confirm('Supprimer ?'))return;await DB.ref('qrcodes/'+id).remove();notif('Supprime.');}
function genDepuis(id){
  const item=items.find(q=>q.id===id);if(!item)return;
  document.getElementById('fa-new').value=item.artist;
  document.getElementById('fn').value=item.name;
  document.getElementById('fu').value=item.url;
  document.getElementById('fp').value=item.price||0;
  document.getElementById('fl').value=item.limit;
  document.getElementById('fm').value=item.expiredMsg||'';
  document.getElementById('res').classList.remove('show');
  document.querySelector('.card').scrollIntoView({behavior:'smooth'});
  notif('Formulaire pre-rempli !');
}
function clearFilters(){
  document.getElementById('f-status').value='';
  document.getElementById('f-artist').value='';
  document.getElementById('search').value='';
  renderList();
}

// ── Dashboard ──────────────────────────────────────────────────────────────────
function renderStats(){
  const t=items.length,a=items.filter(q=>q.scans<q.limit).length,ex=items.filter(q=>q.scans>=q.limit).length;
  const rv=items.reduce((s,q)=>s+(q.scans*(q.price||0)),0);
  document.getElementById('stats').innerHTML=
    '<div class="sc"><div class="sl">QR Codes</div><div class="sv pu">'+t+'</div></div>'+
    '<div class="sc"><div class="sl">Actifs</div><div class="sv gn">'+a+'</div></div>'+
    '<div class="sc"><div class="sl">Expires</div><div class="sv rd">'+ex+'</div></div>'+
    '<div class="sc"><div class="sl">Revenus</div><div class="sv go">'+rv.toLocaleString('fr-FR')+' FCFA</div></div>';
}

function renderArtists(){
  const arts=getArtists(),grid=document.getElementById('art-grid');
  grid.innerHTML='';
  if(!arts.length){grid.innerHTML='<div class="empty">Aucun artiste.</div>';return;}
  arts.forEach(artist=>{
    const it=items.filter(q=>q.artist===artist);
    const sc=it.reduce((s,q)=>s+q.scans,0),rv=it.reduce((s,q)=>s+(q.scans*(q.price||0)),0),ex=it.filter(q=>q.scans>=q.limit).length;
    const d=document.createElement('div');d.className='ac';
    d.innerHTML='<div class="ac-hdr">'+
        '<div><div style="font-size:10px;color:var(--m);font-family:DM Mono,monospace;margin-bottom:3px">ARTISTE</div><div class="ac-name">'+artist+'</div></div>'+
        '<div style="text-align:right"><div style="font-size:10px;color:var(--m);font-family:DM Mono,monospace;margin-bottom:3px">REVENUS</div><div class="ac-rev">'+rv.toLocaleString('fr-FR')+' FCFA</div></div>'+
      '</div>'+
      '<div class="ac-sr">'+
        '<div class="ac-s"><div class="ac-sv" style="color:var(--a2)">'+it.length+'</div><div class="ac-sl">QR</div></div>'+
        '<div class="ac-s"><div class="ac-sv" style="color:var(--a)">'+sc+'</div><div class="ac-sl">Scans</div></div>'+
        '<div class="ac-s"><div class="ac-sv" style="color:var(--r)">'+ex+'</div><div class="ac-sl">Expires</div></div>'+
      '</div>'+
      '<div class="ac-tr">'+
        '<div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-family:DM Mono,monospace">Titres</div>'+
        it.map(i=>'<div class="ac-ti"><span class="ac-tn">'+i.name+'</span><span class="ac-tin">'+i.scans+'/'+i.limit+'</span><span class="ac-tp">'+(i.scans*(i.price||0)).toLocaleString('fr-FR')+' FCFA</span></div>').join('')+
      '</div>';
    grid.appendChild(d);
  });
}

function renderLog(){
  const w=document.getElementById('log-wrap');
  if(!logs.length){w.innerHTML='<div class="empty">Aucun scan.</div>';return;}
  w.innerHTML='<table class="lt"><thead><tr><th>Date</th><th>Artiste</th><th>Titre</th><th>Restants</th></tr></thead><tbody>'+
    logs.slice(0,60).map(l=>'<tr><td>'+new Date(l.time).toLocaleString('fr-FR')+'</td><td style="color:var(--g)">'+(l.artist||'-')+'</td><td>'+l.name+'</td><td><span class="tg '+(l.remaining>0?'tg-g':'tg-r')+'">'+l.remaining+'</span></td></tr>').join('')+
  '</tbody></table>';
}

// ── PDF ────────────────────────────────────────────────────────────────────────
function q2c(text,size){return new Promise(res=>{const d=document.createElement('div');d.style.cssText='position:absolute;left:-9999px;top:-9999px;background:white;';document.body.appendChild(d);new QRCode(d,{text,width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});setTimeout(()=>{const c=d.querySelector('canvas');document.body.removeChild(d);res(c?c.toDataURL('image/png'):null);},350);});}

async function xPDF(){
  if(!items.length){notif('Aucun QR !');return;}
  document.getElementById('pmsg').textContent='Export '+items.length+' QR...';
  document.getElementById('po').classList.add('open');
  try{
    const{jsPDF}=window.jspdf,doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pW=210,pH=297,mg=14,cols=2,cW=(pW-mg*2-8)/cols,cH=112;
    function hdr(p){doc.setFillColor(10,10,15);doc.rect(0,0,pW,17,'F');doc.setTextColor(110,231,183);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('QR VAULT',mg,11);doc.setTextColor(100,116,139);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(new Date().toLocaleDateString('fr-FR'),pW-mg,11,{align:'right'});doc.text('Page '+p,pW/2,11,{align:'center'});}
    hdr(1);let col=0,row=0,pn=1;
    for(let i=0;i<items.length;i++){
      const item=items[i];let cx=mg+col*(cW+8),cy=22+row*(cH+8);
      if(cy+cH>pH-mg){doc.addPage();pn++;hdr(pn);col=0;row=0;cx=mg;cy=22;}
      const ex=item.scans>=item.limit,pr=item.price>0?item.price.toLocaleString('fr-FR')+' FCFA':'Gratuit';
      doc.setFillColor(22,22,31);doc.setDrawColor(ex?248:110,ex?113:231,ex?113:183);doc.setLineWidth(.3);doc.roundedRect(cx,cy,cW,cH,3,3,'FD');
      doc.setDrawColor(245,158,11);doc.setLineWidth(1);doc.line(cx+3,cy+.5,cx+cW-3,cy+.5);doc.setLineWidth(.3);
      const qi=await q2c(item.accessLink,180);
      if(qi){doc.setFillColor(255,255,255);doc.roundedRect(cx+5,cy+6,39,39,2,2,'F');doc.addImage(qi,'PNG',cx+6.5,cy+7.5,36,36);}
      doc.setFillColor(...(ex?[248,113,113]:[110,231,183]));doc.roundedRect(cx+cW-24,cy+5,18,6,1.5,1.5,'F');
      doc.setTextColor(10,10,15);doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.text(ex?'EXPIRE':'ACTIF',cx+cW-15,cy+9.3,{align:'center'});
      doc.setTextColor(245,158,11);doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.text(item.artist,cx+47,cy+12);
      doc.setTextColor(226,232,240);doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.text(doc.splitTextToSize(item.name,cW-52).slice(0,2),cx+47,cy+20);
      doc.setTextColor(245,158,11);doc.setFontSize(8);doc.text(pr,cx+47,cy+30);
      doc.setTextColor(129,140,248);doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.text(item.scans+'/'+item.limit+' · '+(item.limit-item.scans)+' restant(s)',cx+47,cy+37);
      doc.setTextColor(110,231,183);doc.setFontSize(7);doc.text('Code : #'+(item.code||'----'),cx+47,cy+44);
      const bx=cx+5,by=cy+52,bw=cW-10,bh=2.5,pct=Math.min(item.scans/item.limit,1);
      doc.setFillColor(37,37,53);doc.roundedRect(bx,by,bw,bh,1,1,'F');
      if(pct>0){doc.setFillColor(...(pct<.5?[110,231,183]:pct<.8?[251,191,36]:[248,113,113]));doc.roundedRect(bx,by,bw*pct,bh,1,1,'F');}
      doc.setTextColor(245,158,11);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.text('Revenus : '+(item.scans*(item.price||0)).toLocaleString('fr-FR')+' FCFA',cx+5,cy+62);
      col++;if(col>=cols){col=0;row++;}
    }
    const tp=doc.getNumberOfPages();
    for(let p=1;p<=tp;p++){doc.setPage(p);doc.setFillColor(10,10,15);doc.rect(0,pH-9,pW,9,'F');doc.setTextColor(100,116,139);doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.text('QR Vault · '+new Date().toLocaleString('fr-FR'),mg,pH-3.5);doc.text(items.length+' QR · Page '+p+'/'+tp,pW-mg,pH-3.5,{align:'right'});}
    doc.save('qr-vault-'+new Date().toISOString().slice(0,10)+'.pdf');
    notif('PDF exporte !');
  }catch(e){notif('Erreur PDF');}
  document.getElementById('po').classList.remove('open');
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function notif(msg){const n=document.createElement('div');n.className='notif';n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);}
</script>
