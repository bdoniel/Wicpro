<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0a0a0f;--s:#111118;--c:#16161f;--b:#252535;--a:#6ee7b7;--a2:#818cf8;--r:#f87171;--g:#f59e0b;--t:#e2e8f0;--m:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--b) 1px,transparent 1px),linear-gradient(90deg,var(--b) 1px,transparent 1px);background-size:40px 40px;opacity:.2;pointer-events:none;z-index:0}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading.hide{display:none}
.spin{width:40px;height:40px;border:3px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{color:var(--m);font-size:13px;font-family:'DM Mono',monospace}

/* Scan page */
#scan-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px}
#scan-page.open{display:flex}
.s-icon{font-size:72px;margin-bottom:20px}
.s-title{font-size:28px;font-weight:800;margin-bottom:10px}
.s-sub{color:var(--m);font-size:14px;line-height:1.8;margin-bottom:16px;white-space:pre-line}
.s-cd{font-family:'DM Mono',monospace;font-size:15px;color:var(--a);font-weight:700}

/* Player page */
#player-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding:24px 20px}
#player-page.open{display:block}
.pw{max-width:500px;margin:0 auto;text-align:center;padding-bottom:40px}
.p-artist{font-size:12px;color:var(--g);font-family:'DM Mono',monospace;font-weight:600;margin-bottom:6px;letter-spacing:1px}
.p-title{font-size:22px;font-weight:800;margin-bottom:20px}
.p-cover{width:200px;height:200px;background:linear-gradient(135deg,var(--a2),var(--a));border-radius:14px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:72px;box-shadow:0 16px 48px rgba(129,140,248,.3)}
audio,video{width:100%;border-radius:10px;margin-bottom:16px}
.dl-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--a),#34d399);color:#0a0a0f;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:8px}
.dl-btn:hover{transform:translateY(-1px)}
.dl-btn:disabled{background:var(--b);color:var(--m);cursor:not-allowed;transform:none}
.dl-note{font-size:11px;color:var(--m);font-family:'DM Mono',monospace;margin-bottom:16px}
.p-code-box{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:14px;margin-top:16px}
.p-code-box p{font-size:11px;color:var(--m);font-family:'DM Mono',monospace;margin-bottom:5px}
.p-code-box span{font-size:22px;font-weight:800;color:var(--a);font-family:'DM Mono',monospace}

/* App */
#app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 20px;display:none}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--b);flex-wrap:wrap;gap:14px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--a),var(--a2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo h1 span{color:var(--a)}
.logo small{display:block;font-size:10px;color:var(--m);font-family:'DM Mono',monospace;letter-spacing:1px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--m);margin-right:5px;transition:background .3s;vertical-align:middle}
.dot.on{background:var(--a)}
.hright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tnav{display:flex;gap:3px;background:var(--s);padding:4px;border-radius:10px;border:1px solid var(--b)}
.tb{padding:7px 16px;border:none;background:transparent;color:var(--m);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tb.active{background:var(--c);color:var(--t)}
.tb:hover:not(.active){color:var(--t)}
.panel{display:none}.panel.active{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:28px;margin-bottom:24px}
.card h2{font-size:16px;font-weight:700;margin-bottom:20px}
.card h2 span{color:var(--a)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgp{display:flex;flex-direction:column;gap:7px}
.fgp.full{grid-column:1/-1}
label{font-size:11px;font-weight:700;color:var(--m);letter-spacing:.8px;text-transform:uppercase}
input,select{width:100%;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:11px 13px;color:var(--t);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--a2)}
select option{background:var(--s)}
.pw2{display:flex;gap:8px;align-items:center}
.cur{background:var(--b);color:var(--m);padding:11px 12px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap}
.pw2 input{flex:1}
.fa{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--a),#34d399);color:#0a0a0f}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(110,231,183,.2)}
.btn-g{background:linear-gradient(135deg,var(--g),#d97706);color:#0a0a0f}
.btn-g:hover{transform:translateY(-1px)}
.btn-gh{background:var(--s);color:var(--t);border:1px solid var(--b)}
.btn-gh:hover{border-color:var(--a2)}
.bsm{background:var(--s);color:var(--a2);border:1px solid var(--b);padding:5px 12px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;border-radius:7px;cursor:pointer;transition:all .2s}
.bsm:hover{border-color:var(--a2)}
.bdr{background:transparent;color:var(--r);border:1px solid var(--r);padding:5px 12px;font-size:11px;border-radius:7px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600}
.bdr:hover{background:rgba(248,113,113,.1)}

/* Result */
.res{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:28px;margin-bottom:24px;display:none;text-align:center}
.res.show{display:block;animation:fi .3s ease}
.qbox{display:inline-block;margin-bottom:20px;width:100%}
.qinfo{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:16px;text-align:left}
.qinfo p{font-family:'DM Mono',monospace;font-size:12px;color:var(--m);margin-bottom:5px}
.qinfo p:last-child{margin-bottom:0}
.qinfo span{color:var(--t);font-weight:600}
.qinfo .hl{color:var(--a)}
.dlbtn{width:100%;padding:12px;background:var(--s);color:var(--a2);border:1px solid var(--b);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:8px}
.dlbtn:hover{border-color:var(--a2)}
.nbtn{width:100%;padding:12px;background:transparent;color:var(--m);border:1px solid var(--b);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.nbtn:hover{color:var(--t);border-color:var(--m)}

/* QR list */
.qg{display:grid;gap:12px}
.qi{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
.qi.expired{opacity:.55;border-color:rgba(248,113,113,.4)}
.qth{width:56px;height:56px;background:white;border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.qth canvas,.qth img{width:52px!important;height:52px!important}
.qii h3{font-size:13px;font-weight:700;margin-bottom:2px}
.qat{font-size:11px;color:var(--g);font-family:'DM Mono',monospace;margin-bottom:5px;font-weight:600}
.qmt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.tg{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:10px;font-weight:600}
.tg-g{background:rgba(110,231,183,.12);color:var(--a);border:1px solid rgba(110,231,183,.2)}
.tg-r{background:rgba(248,113,113,.12);color:var(--r);border:1px solid rgba(248,113,113,.2)}
.tg-p{background:rgba(129,140,248,.12);color:var(--a2);border:1px solid rgba(129,140,248,.2)}
.tg-go{background:rgba(245,158,11,.12);color:var(--g);border:1px solid rgba(245,158,11,.2)}
.tg-code{background:rgba(110,231,183,.1);color:var(--a);border:1px solid rgba(110,231,183,.3)}
.br2{height:3px;background:var(--b);border-radius:2px;overflow:hidden;margin-top:6px}
.bf{height:100%;border-radius:2px;transition:width .3s}
.qac{display:flex;flex-direction:column;gap:5px}

/* Stats */
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:18px 22px}
.sl{font-size:10px;color:var(--m);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace}
.sv{font-size:28px;font-weight:800}
.sv.gn{color:var(--a)}.sv.pu{color:var(--a2)}.sv.rd{color:var(--r)}.sv.go{color:var(--g)}

/* Artist */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.ac{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:22px;position:relative;overflow:hidden}
.ac::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g),var(--a2))}
.ac-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ac-name{font-size:16px;font-weight:800}
.ac-rev{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;color:var(--g)}
.ac-sr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.ac-s{text-align:center}
.ac-sv{font-size:20px;font-weight:800}
.ac-sl{font-size:10px;color:var(--m);font-family:'DM Mono',monospace;margin-top:2px}
.ac-tr{border-top:1px solid var(--b);padding-top:12px}
.ac-ti{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(37,37,53,.5);font-size:12px}
.ac-ti:last-child{border-bottom:none}
.ac-tn{color:var(--t);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.ac-tin{font-family:'DM Mono',monospace;font-size:11px;color:var(--m)}
.ac-tp{font-family:'DM Mono',monospace;font-size:11px;color:var(--g);font-weight:600}

/* Log */
.lt{width:100%;border-collapse:collapse}
.lt th{text-align:left;font-size:10px;color:var(--m);letter-spacing:.8px;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid var(--b);font-family:'DM Mono',monospace}
.lt td{padding:10px 14px;font-family:'DM Mono',monospace;font-size:11px;border-bottom:1px solid rgba(37,37,53,.4)}
.lt tr:last-child td{border-bottom:none}
.lt tr:hover td{background:rgba(255,255,255,.015)}

/* PDF overlay */
.po{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;flex-direction:column}
.po.open{display:flex}
.po .spin{border-top-color:var(--g);margin-bottom:18px}
.po p{color:var(--t);font-size:14px;font-weight:600}

/* Search */
.sb{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sb input{flex:1;min-width:200px;padding:8px 12px;font-size:12px}
.sb select{width:auto;padding:8px 12px;font-size:12px}

.empty{text-align:center;padding:40px;color:var(--m);font-size:13px;font-family:'DM Mono',monospace}
.notif{position:fixed;bottom:20px;right:20px;background:var(--c);border:1px solid var(--a);border-radius:10px;padding:12px 18px;font-size:13px;z-index:9999;animation:ni .3s ease}
@keyframes ni{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:700px){.sr{grid-template-columns:repeat(2,1fr)}.fg{grid-template-columns:1fr}.qi{grid-template-columns:1fr}.ag{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p id="lmsg">Connexion...</p></div>

<div id="scan-page">
  <div class="s-icon" id="si"></div>
  <div class="s-title" id="st"></div>
  <div class="s-sub" id="ss"></div>
  <div class="s-cd" id="sc"></div>
</div>

<div id="player-page">
  <div class="pw">
    <div class="p-artist" id="pl-artist"></div>
    <div class="p-title" id="pl-title"></div>
    <div class="p-cover" id="pl-cover">🎵</div>
    <div id="pl-media"></div>
    <button class="dl-btn" id="dl-btn" onclick="doDownload()">&#8659; Telecharger (1 fois uniquement)</button>
    <div class="dl-note" id="dl-note">Ce bouton disparaitra apres telechargement</div>
    <div class="p-code-box">
      <p>TON CODE DE RENOUVELLEMENT</p>
      <span id="pl-code"></span>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⬛</div>
      <div>
        <h1>QR <span>Vault</span></h1>
        <small><span class="dot" id="dot"></span>LIVE</small>
      </div>
    </div>
    <div class="hright">
      <button class="btn btn-g" onclick="xPDF()">&#128424; PDF</button>
      <nav class="tnav">
        <button class="tb active" onclick="showTab('gen',event)">&#10022; Generateur</button>
        <button class="tb" onclick="showTab('dash',event)">&#9672; Dashboard</button>
      </nav>
    </div>
  </header>

  <div class="panel active" id="panel-gen">
    <div class="card">
      <h2>Nouveau QR Code <span>limite</span></h2>
      <div class="fg">
        <div class="fgp">
          <label>Artiste</label>
          <div style="display:flex;gap:8px">
            <select id="fa-sel" style="flex:1"><option value="">-- Existant --</option></select>
            <input type="text" id="fa-new" placeholder="Nouvel artiste..." style="flex:1" />
          </div>
        </div>
        <div class="fgp">
          <label>Titre</label>
          <input type="text" id="fn" placeholder="Ex : Album Vol.1" />
        </div>
        <div class="fgp full">
          <label>Type de contenu</label>
          <select id="ftype" onchange="toggleType()">
            <option value="single">Morceau unique</option>
            <option value="album">Album (plusieurs morceaux)</option>
          </select>
        </div>
        <div class="fgp full" id="single-url">
          <label>Lien du fichier (Cloudflare R2, Drive...)</label>
          <input type="url" id="fu" placeholder="https://pub-xxx.r2.dev/fichier.mp3" />
        </div>
        <div class="fgp full" id="album-tracks" style="display:none">
          <label>Morceaux de l'album</label>

        <div class="fgp">
          <label>Scans max</label>
          <input type="number" id="fl" value="1" min="1" max="999" />
        </div>
        <div class="fgp">
          <label>Prix (FCFA)</label>
          <div class="pw2"><span class="cur">FCFA</span><input type="number" id="fp" placeholder="0" min="0" /></div>
        </div>
        <div class="fgp full">
          <label>Message expiration</label>
          <input type="text" id="fm" placeholder="Ex : Acces expire. Contactez BDoniel." />
        </div>
      </div>
      <div class="fa">
        <button class="btn btn-p" onclick="creerQR()">&#11035; Generer QR</button>
        <button class="btn btn-gh" onclick="clearForm()">Effacer</button>
      </div>
    </div>

    <div class="res" id="res">
      <div class="qbox" id="qbox"></div>
      <div class="qinfo" id="qinfo"></div>

    </div>

    <div class="card">
      <h2>Mes QR Codes <span id="lc"></span></h2>
      <div class="sb">
        <input type="text" id="search" placeholder="Rechercher par code, artiste, titre..." oninput="renderList()" />
        <select id="f-artist" onchange="renderList()"><option value="">Tous les artistes</option></select>
        <select id="f-status" onchange="renderList()">
          <option value="">Tous</option>
          <option value="active">Actifs</option>
          <option value="expired">Expires</option>
        </select>
        <button class="bsm" style="color:var(--r);border-color:var(--r)" onclick="document.getElementById('f-status').value='expired';renderList()">&#128683; Expires</button>
        <button class="bsm" onclick="clearFilters()">Tout</button>
      </div>
      <div class="qg" id="lst"></div>
    </div>
  </div>

  <div class="panel" id="panel-dash">
    <div class="sr" id="stats"></div>
    <div class="card">
      <h2>Rapport par <span>Artiste</span></h2>
      <div class="ag" id="art-grid"></div>
    </div>
    <div class="card">
      <h2>Journal des <span>Scans</span></h2>
      <div id="log-wrap"></div>
    </div>
  </div>
</div>

<div class="po" id="po"><div class="spin"></div><p id="pmsg">PDF...</p></div>

<script>
const BASE = 'https://bdoniel.github.io/Wicpro';
let items = [], logs = [], lastId = null, plItem = null, plQRId = null;

// ── Init ───────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const sid = new URLSearchParams(location.search).get('scan');
  if (sid) { handleScan(sid); return; }
  
  DB.ref('.info/connected').on('value', snap => {
    if (snap.val() === true) {
      document.getElementById('dot').classList.add('on');
      document.getElementById('loading').classList.add('hide');
      document.getElementById('app').style.display = 'block';
      DB.ref('qrcodes').on('value', snap => {
        items = Object.values(snap.val()||{}).sort((a,b)=>(b.created||0)-(a.created||0));
        refreshSelects(); renderList();
      });
      DB.ref('scanlogs').on('value', snap => {
        logs = Object.values(snap.val()||{}).sort((a,b)=>(b.time||0)-(a.time||0));
      });
    }
  });

  // Timeout apres 8 secondes
  setTimeout(() => {
    if (document.getElementById('loading').style.display !== 'none' &&
        !document.getElementById('loading').classList.contains('hide')) {
      document.getElementById('loading').classList.add('hide');
      document.getElementById('app').style.display = 'block';
      notif('Connexion lente - verifie ton internet');
    }
  }, 8000);
});

// ── Scan ───────────────────────────────────────────────────────────────────────
async function handleScan(id) {
  document.getElementById('lmsg')
